<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dokument</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f2f4f7;
}

#doc {
  display:flex;
  height:100vh;
  align-items:center;
  justify-content:center;
}

button {
  padding:15px 25px;
  font-size:18px;
  border-radius:10px;
}

#prank {
  display:none;
  background:black;
  color:white;
  height:100vh;
  overflow:hidden;
  position:relative;
}

img {
  position:absolute;
  width:120px;
  animation:move 6s infinite linear;
}

@keyframes move {
  0%{top:0;left:0;}
  50%{top:80%;left:80%;}
  100%{top:0;left:0;}
}

h1 {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:50px;
  text-align:center;
}
</style>
</head>

<body>

<div id="doc">
  <button onclick="openDoc()">Otwórz dokument</button>
</div>

<div id="prank">
  <img src="foto.jpg">
  <h1>Chorujesz na<br>głuchotę i głupotę</h1>
</div>

<audio id="music" src="muzyka.wav" loop></audio>

<script>
function openDoc(){
  document.getElementById("doc").style.display="none";
  document.getElementById("prank").style.display="block";
  document.getElementById("music").play();
}
</script>

</body>
</html>
